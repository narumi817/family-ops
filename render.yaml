services:
  # Rails API (backend)
  - type: web
    name: family-ops-api
    env: ruby
    rootDir: api
    plan: free
    region: singapore
    buildCommand: |
      bundle install --without development test
    startCommand: |
      bundle exec rails db:migrate && bundle exec rails db:seed && bundle exec rails server -p $PORT -b 0.0.0.0
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      # Rails 環境
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      # CORS設定（クライアントのオリジンを許可）
      - key: ALLOWED_ORIGINS
        value: https://mizk.net,https://www.mizk.net
      # Render のダッシュボードで設定する環境変数
      # SECRET_KEY_BASE     : .secret_key ファイルの内容
      # DATABASE_URL        : DB(Neon)の接続URL
      # メール送信設定（Resend）
      # RESEND_API_KEY      : Resend の API キー
      # RESEND_FROM_EMAIL   : 送信元メールアドレス (例: "FamilyOps <no-reply@your-domain>")
      # MAILER_HOST         : メール本文内リンクのホスト (例: family-ops-client.onrender.com)
      # 

  # Nuxt 3 (frontend)
  - type: web
    name: family-ops-client
    env: node
    rootDir: client
    plan: free
    region: singapore
    buildCommand: |
      npm ci
      npm run build
    startCommand: |
      node .output/server/index.mjs
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Nuxt から見た API URL（サブドメイン）
      - key: BASE_URL
        value: https://api.mizk.net
